version: "3.8"

services:
  shape-mainnet-op-geth:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-geth:v1.101603.4
    container_name: shape-mainnet-op-geth
    restart: unless-stopped
    network_mode: host
    command:
      - --op-network=shape-mainnet
      - --datadir=/data
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.api=eth,net,web3,debug,txpool
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=8546
      - --ws.api=eth,net,web3,debug,txpool
      - --authrpc.addr=127.0.0.1
      - --authrpc.port=8551
      - --authrpc.jwtsecret=/jwt.txt
      - --authrpc.vhosts=*
      - --port=30303
      - --verbosity=3
      - --nat=extip:${SERVER_PUBLIC_IP}
      - --rollup.sequencerhttp=https://mainnet.shape.network
      - --rollup.historicalrpc=https://mainnet.shape.network
      - --rollup.disabletxpoolgossip=true
      - --syncmode=full
      - --history.transactions=0
      - --history.logs=0
      - --override.granite=1727370000
      - --override.holocene=1739880000
      - --override.isthmus=1774530000
      - --override.jovian=1778157001
    volumes:
      - /root/shape-mainnet-geth/jwt.hex:/jwt.txt:ro
      - /root/Upload:/data

  shape-mainnet-op-node:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node:v1.18.0
    container_name: shape-mainnet-op-node
    restart: unless-stopped
    network_mode: host
    command:
      - op-node
      - --l1=${L1_RPC_URL}
      - --l1.rpckind=alchemy
      - --l1.beacon=${L1_BEACON_URL}
      - --l2=http://127.0.0.1:8551
      - --l2.jwt-secret=/shared/jwt.hex
      - --network=shape-mainnet
      - --l2.enginekind=geth
      - --syncmode=consensus-layer
      - --rpc.addr=127.0.0.1
      - --rpc.port=9545
      - --metrics.enabled
      - --metrics.port=7300
      - --p2p.bootnodes=${SHAPE_BOOTNODES}
      - --p2p.listen.tcp=9222
      - --p2p.listen.udp=9222
      - --override.granite=1727370000
      - --override.holocene=1739880000
      - --override.isthmus=1774530000
      - --override.jovian=1778157001
    volumes:
      - /root/shape-mainnet-geth/opnode-data:/data
      - /root/shape-mainnet-geth/jwt.hex:/shared/jwt.hex:ro
      - /root/.shape-mainnet-geth-config:/config:ro
